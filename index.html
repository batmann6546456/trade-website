<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRADAI — AI Crypto Signals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              tradai: {
                bg: '#02050a',
                panel: 'rgba(8, 22, 31, 0.55)',
                neon: '#24ffd2',
                lime: '#8bff5b',
                blue: '#44c7ff',
                danger: '#ff607d'
              }
            },
            boxShadow: {
              neon: '0 0 40px rgba(36,255,210,.28)',
              lime: '0 0 34px rgba(139,255,91,.25)'
            },
            borderRadius: {
              xl2: '1rem'
            }
          }
        }
      }
    </script>
    <style>
      body {
        background: radial-gradient(circle at 50% -20%, #123742 0%, #050913 45%, #02050a 74%);
        color: #dcfbf6;
      }
      .glass {
        background: rgba(8, 22, 31, 0.55);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(68, 199, 255, 0.22);
      }
      .grid-bg::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image: linear-gradient(rgba(36,255,210,.08) 1px, transparent 1px), linear-gradient(90deg, rgba(36,255,210,.08) 1px, transparent 1px);
        background-size: 38px 38px;
        opacity: .3;
        pointer-events: none;
      }
      .orb {
        background: radial-gradient(circle at 30% 30%, #c1fff6 0%, #24ffd2 26%, #1b5f85 58%, #04111d 100%);
        animation: bob 6s ease-in-out infinite;
      }
      .ring { animation: spin 10s linear infinite; }
      .ring.r2 { animation-direction: reverse; animation-duration: 14s; }
      .scan {
        background: linear-gradient(90deg, transparent, rgba(36,255,210,.2), transparent);
        animation: sweep 2.2s linear infinite;
      }
      .pulse-live { animation: pulse 1.2s infinite; }
      .card-lift { transition: transform .24s, box-shadow .24s; }
      .card-lift:hover { transform: translateY(-6px); box-shadow: 0 0 40px rgba(36,255,210,.2); }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes bob { 0%,100%{ transform: translateY(0)} 50%{ transform: translateY(-14px)} }
      @keyframes sweep { from { transform: translateX(-120%);} to { transform: translateX(120%);} }
      @keyframes pulse { 50% { opacity:.35; transform: scale(.75);} }
    </style>
  </head>
  <body class="min-h-screen font-sans">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;
      const {
        ResponsiveContainer, LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Area, AreaChart
      } = Recharts;

      const performanceData = [
        { d: 'W1', equity: 100 }, { d: 'W2', equity: 107 }, { d: 'W3', equity: 113 },
        { d: 'W4', equity: 110 }, { d: 'W5', equity: 121 }, { d: 'W6', equity: 129 },
        { d: 'W7', equity: 138 }, { d: 'W8', equity: 146 }, { d: 'W9', equity: 151 }, { d: 'W10', equity: 160 }
      ];

      const liveSignals = [
        { pair:'BTC/USDT', direction:'LONG', entry:'65,420', sl:'63,800', tp:'68,500', confidence:84, expires:'1h', why:'RSI oversold + volume breakout + trendline support' },
        { pair:'ETH/USDT', direction:'SHORT', entry:'3,240', sl:'3,380', tp:'3,020', confidence:76, expires:'2h', why:'Bearish divergence + rejection at resistance + funding skew' },
        { pair:'SOL/USDT', direction:'LONG', entry:'168', sl:'161', tp:'182', confidence:71, expires:'47m', why:'Momentum reclaim + bullish orderflow + social sentiment spike' },
        { pair:'XRP/USDT', direction:'SHORT', entry:'0.89', sl:'0.93', tp:'0.82', confidence:68, expires:'1h 12m', why:'Failed breakout + MACD rollover + liquidity sweep' },
      ];

      const historyRows = [
        ['BTC/USDT','LONG','65,420','63,800','68,500','TP','+4.7%'],
        ['ETH/USDT','SHORT','3,240','3,380','3,020','TP','+6.8%'],
        ['SOL/USDT','LONG','168','161','182','SL','-4.1%'],
        ['BTC/USDT','SHORT','67,020','67,980','64,900','SL','-2.8%'],
        ['ETH/USDT','LONG','3,110','3,040','3,320','TP','+5.2%']
      ];

      function ParticleBg() {
        useEffect(() => {
          const canvas = document.getElementById('particles');
          const ctx = canvas.getContext('2d');
          let dots = [];
          const make = () => Array.from({length: 95}, () => ({
            x: Math.random() * innerWidth,
            y: Math.random() * innerHeight,
            vx: (Math.random() - 0.5) * 0.35,
            vy: (Math.random() - 0.5) * 0.35,
            r: Math.random() * 1.8 + 0.5
          }));
          const resize = () => {
            canvas.width = innerWidth;
            canvas.height = innerHeight;
            dots = make();
          };
          const tick = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            dots.forEach((p) => {
              p.x += p.vx; p.y += p.vy;
              if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
              if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
              ctx.beginPath();
              ctx.fillStyle = 'rgba(68,199,255,.8)';
              ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
              ctx.fill();
            });
            requestAnimationFrame(tick);
          };
          resize();
          addEventListener('resize', resize);
          tick();
          return () => removeEventListener('resize', resize);
        }, []);
        return <canvas id="particles" className="fixed inset-0 -z-10 opacity-70" />;
      }

      function App() {
        const [slots, setSlots] = useState(6);
        const [loading, setLoading] = useState(true);
        const [metrics, setMetrics] = useState({ winRate: 64.2, roi: 124, trades: 438, rr: 2.3 });

        useEffect(() => {
          const t = setTimeout(() => setLoading(false), 1200);
          const slotTick = setInterval(() => setSlots((n) => Math.max(2, Math.min(8, n + (Math.random() > 0.5 ? -1 : 1)))), 5000);
          const metricTick = setInterval(() => {
            setMetrics({
              winRate: +(61.8 + Math.random() * 4.8).toFixed(1),
              roi: Math.round(116 + Math.random() * 16),
              trades: Math.round(430 + Math.random() * 36),
              rr: +(1.9 + Math.random() * .6).toFixed(1)
            })
          }, 6000);
          return () => { clearTimeout(t); clearInterval(slotTick); clearInterval(metricTick); };
        }, []);

        const trust = useMemo(() => [
          '+124% ROI (Last 90 Days) — Verified',
          'Tracked via Binance & Bybit APIs',
          'Updated Every 60 Seconds'
        ], []);

        if (loading) {
          return (
            <div className="min-h-screen grid place-items-center text-center px-4 relative overflow-hidden">
              <ParticleBg />
              <div className="glass rounded-2xl p-8 max-w-xl w-full relative overflow-hidden">
                <div className="scan absolute inset-y-0 w-1/2" />
                <p className="text-tradai-neon tracking-[.2em] text-xs">AI SCANNING MARKETS</p>
                <h1 className="text-2xl md:text-3xl font-semibold mt-3">TRADAI booting live signal engine...</h1>
              </div>
            </div>
          );
        }

        return (
          <div className="relative overflow-hidden">
            <ParticleBg />
            <div className="absolute inset-0 grid-bg -z-10" />

            <nav className="sticky top-0 z-30 backdrop-blur-md bg-black/50 border-b border-cyan-300/20">
              <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
                <div className="text-xl font-bold tracking-[.2em]">TRAD<span className="text-tradai-neon drop-shadow-[0_0_15px_rgba(36,255,210,.8)]">AI</span></div>
                <div className="flex items-center gap-2">
                  <span className="hidden md:flex items-center gap-2 glass rounded-full px-3 py-1 text-sm text-tradai-lime border border-tradai-lime/30">
                    <span className="w-2 h-2 rounded-full bg-tradai-lime pulse-live" /> 🟢 AI LIVE — Tracking Markets
                  </span>
                  <a href="#pricing" className="px-4 py-2 rounded-xl font-semibold bg-gradient-to-r from-tradai-lime to-tradai-neon text-black shadow-lime">Start Pro</a>
                </div>
              </div>
            </nav>

            <header className="max-w-6xl mx-auto px-4 py-16 text-center">
              <span className="inline-flex items-center gap-2 glass rounded-full px-4 py-2 text-sm text-tradai-lime border border-tradai-lime/30">
                <span className="w-2 h-2 rounded-full bg-tradai-lime pulse-live" /> 🟢 AI LIVE — Tracking Markets
              </span>
              <div className="relative w-56 h-56 mx-auto mt-8 mb-8">
                <div className="absolute inset-0 rounded-full border border-cyan-200/30 ring" />
                <div className="absolute -inset-4 rounded-full border border-lime-200/25 ring r2" />
                <div className="absolute inset-4 rounded-full orb shadow-neon" />
              </div>
              <h1 className="text-4xl md:text-6xl font-bold leading-tight">AI-Powered Crypto Signals That Actually Perform</h1>
              <p className="max-w-3xl mx-auto mt-5 text-lg text-slate-300">60%+ Win Rate. Real-Time Entries, Stop Loss &amp; Take Profit. Fully Transparent. No Guesswork.</p>
              <div className="mt-8 flex flex-wrap justify-center gap-3">
                <a href="#signals" className="px-5 py-3 rounded-xl font-semibold bg-gradient-to-r from-tradai-lime to-tradai-neon text-black shadow-lime">🚀 View Live Signals</a>
                <a href="#performance" className="px-5 py-3 rounded-xl font-semibold glass border border-cyan-300/30 text-cyan-100">📊 See Performance</a>
              </div>
              <div className="grid md:grid-cols-3 gap-3 mt-8">
                {trust.map((t) => <div key={t} className="glass rounded-2xl p-3 text-sm">{t}</div>)}
              </div>
            </header>

            <main className="max-w-6xl mx-auto px-4 pb-16 space-y-12">
              <section id="performance" className="space-y-4">
                <h2 className="text-2xl font-semibold">Performance Dashboard</h2>
                <p className="text-slate-300">Fully Transparent Performance — No Hidden Trades</p>
                <div className="glass rounded-2xl p-4 h-72">
                  <ResponsiveContainer width="100%" height="100%">
                    <AreaChart data={performanceData}>
                      <defs>
                        <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="5%" stopColor="#24ffd2" stopOpacity={.45}/>
                          <stop offset="95%" stopColor="#24ffd2" stopOpacity={0}/>
                        </linearGradient>
                      </defs>
                      <CartesianGrid stroke="rgba(148,163,184,.18)" strokeDasharray="3 3" />
                      <XAxis dataKey="d" stroke="#9db6b4" />
                      <YAxis stroke="#9db6b4" />
                      <Tooltip contentStyle={{ background: '#041119', border: '1px solid rgba(68,199,255,.3)' }} />
                      <Area type="monotone" dataKey="equity" stroke="#44c7ff" fill="url(#fill)" strokeWidth={3} />
                    </AreaChart>
                  </ResponsiveContainer>
                </div>
                <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-3">
                  <Metric label="Win Rate %" value={`${metrics.winRate}%`} />
                  <Metric label="Total ROI %" value={`+${metrics.roi}%`} />
                  <Metric label="Total Trades" value={`${metrics.trades}`} />
                  <Metric label="Risk / Reward" value={`1 : ${metrics.rr}`} />
                </div>
              </section>

              <section id="signals" className="space-y-4">
                <div className="flex flex-wrap justify-between items-center gap-2">
                  <h2 className="text-2xl font-semibold">⚡ Live Signals</h2>
                  <div className="glass rounded-full px-4 py-2 text-sm text-tradai-lime border border-tradai-lime/30">
                    Only {slots} signals left today
                  </div>
                </div>
                <div className="grid md:grid-cols-2 gap-4">
                  {liveSignals.map((s) => <SignalCard key={s.pair + s.direction} signal={s} />)}
                </div>
              </section>

              <section>
                <h2 className="text-2xl font-semibold mb-4">🔔 Features</h2>
                <div className="grid md:grid-cols-3 gap-3">
                  {['🤖 AI Multi-Indicator Engine','📡 Real-Time Market Tracking','🔔 Telegram Alerts Integration','⚙️ Auto-Trade (Optional)','📊 Risk Management Built-In','🌐 Social Sentiment Analysis'].map((x) => (
                    <div key={x} className="glass rounded-2xl p-4 font-medium">{x}</div>
                  ))}
                </div>
              </section>

              <section id="pricing" className="space-y-4">
                <h2 className="text-2xl font-semibold">💰 Pricing</h2>
                <p className="text-slate-300">10,000+ traders using TRADAI</p>
                <div className="grid md:grid-cols-2 gap-4">
                  <PricingCard title="FREE PLAN" price="$0" items={['Limited signals','Delayed updates']} cta="Get Started" />
                  <PricingCard title="PRO PLAN" price="$19/month" items={['All signals unlocked','Real-time alerts','AI explanations','Priority updates']} cta="Upgrade to Pro" pro />
                </div>
              </section>

              <section className="space-y-4">
                <h2 className="text-2xl font-semibold">📉 Transparency</h2>
                <p className="text-slate-300">We don’t hide losses. Transparency builds trust.</p>
                <div className="glass rounded-2xl overflow-x-auto">
                  <table className="min-w-full text-sm">
                    <thead className="bg-cyan-400/5">
                      <tr>{['Pair','Direction','Entry','SL','TP','Result','Profit %'].map((h) => <th key={h} className="text-left px-4 py-3">{h}</th>)}</tr>
                    </thead>
                    <tbody>
                      {historyRows.map((r, i) => (
                        <tr key={i} className="border-t border-cyan-200/10">
                          <td className="px-4 py-3">{r[0]}</td>
                          <td className={`px-4 py-3 ${r[1] === 'LONG' ? 'text-tradai-lime' : 'text-tradai-danger'}`}>{r[1]}</td>
                          <td className="px-4 py-3">{r[2]}</td><td className="px-4 py-3">{r[3]}</td><td className="px-4 py-3">{r[4]}</td><td className="px-4 py-3">{r[5]}</td>
                          <td className={`px-4 py-3 ${r[6].startsWith('+') ? 'text-tradai-lime' : 'text-tradai-danger'}`}>{r[6]}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </section>

              <section className="glass rounded-2xl p-5 flex flex-wrap gap-3 items-center justify-between">
                <div>
                  <h3 className="text-xl font-semibold">Ready to trade with verified AI signals?</h3>
                  <p className="text-slate-300">Live entries, transparent outcomes, and risk controls built in.</p>
                </div>
                <a href="#pricing" className="px-5 py-3 rounded-xl font-semibold bg-gradient-to-r from-tradai-lime to-tradai-neon text-black shadow-lime">🚀 Unlock TRADAI Pro</a>
              </section>
            </main>

            <footer className="border-t border-cyan-200/20 py-6 text-slate-400 text-sm text-center">
              TRADAI · Educational content only. Trading carries risk.
            </footer>
          </div>
        );
      }

      function Metric({ label, value }) {
        return (
          <div className="glass rounded-2xl p-4">
            <div className="text-slate-400 text-sm">{label}</div>
            <div className="text-2xl font-semibold mt-1">{value}</div>
          </div>
        );
      }

      function PricingCard({ title, price, items, cta, pro = false }) {
        return (
          <div className={`glass rounded-2xl p-5 relative ${pro ? 'border-lime-300/40 shadow-lime' : ''}`}>
            {pro && <span className="absolute top-3 right-3 text-xs px-2 py-1 rounded-full bg-tradai-lime text-black font-semibold">Most Popular</span>}
            <h3 className="text-lg font-semibold">{title}</h3>
            <p className="text-3xl font-bold mt-2">{price}</p>
            <ul className="mt-3 space-y-2 text-slate-300 text-sm">{items.map((i) => <li key={i}>• {i}</li>)}</ul>
            <button className={`mt-5 px-4 py-2 rounded-xl font-semibold ${pro ? 'bg-gradient-to-r from-tradai-lime to-tradai-neon text-black' : 'glass border border-cyan-300/30 text-cyan-100'}`}>{cta}</button>
          </div>
        );
      }

      function SignalCard({ signal }) {
        const isLong = signal.direction === 'LONG';
        return (
          <article className="glass rounded-2xl p-4 card-lift">
            <div className="flex justify-between items-start gap-2">
              <div className="text-lg font-semibold">{signal.pair}</div>
              <span className={`text-xs font-bold px-2 py-1 rounded-lg ${isLong ? 'text-tradai-lime bg-lime-300/10 border border-lime-300/30' : 'text-tradai-danger bg-rose-300/10 border border-rose-300/30'}`}>{signal.direction}</span>
            </div>
            <div className="text-xs text-tradai-neon mt-2 flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-tradai-neon pulse-live" /> LIVE · Just Triggered</div>
            <div className="grid grid-cols-3 gap-2 mt-3 text-sm">
              <Field title="Entry" value={signal.entry} />
              <Field title="Stop Loss" value={signal.sl} />
              <Field title="Take Profit" value={signal.tp} />
              <Field title="Confidence" value={`${signal.confidence}%`} />
              <Field title="Timer" value={`Expires in ${signal.expires}`} />
              <Field title="Status" value="Monitoring" />
            </div>
            <details className="mt-3 border-t border-cyan-200/20 pt-3 text-sm">
              <summary className="cursor-pointer text-cyan-100">Why this trade?</summary>
              <p className="text-slate-300 mt-2">{signal.why}</p>
            </details>
          </article>
        );
      }

      function Field({ title, value }) {
        return <div><div className="text-xs text-slate-400">{title}</div><div>{value}</div></div>;
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
