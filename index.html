<!DOCTYPE html>
<html>
<head>
  <title>Trade AI Live Signals</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="background:#000;color:#0ff;font-family:monospace">

<h2>🔥 LIVE SIGNALS</h2>
<div id="signals"></div>

<h2>📊 TRADE HISTORY</h2>
<div id="history"></div>

<script>
// ===============================
// CONFIG (REPLACE THESE)
// ===============================
const SUPABASE_URL = "https://hlfianhpyryrnnmxwlcy.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhsZmlhbmhweXJ5cm5ubXh3bGN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTc5MjIsImV4cCI6MjA5MTg5MzkyMn0.SeCgt7JYkYpKmjWSAYBlkLOuE5cL7HkvvjD02WGk4Ik";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ===============================
// TRANSFORM ORDERS → SIGNALS
// ===============================
function transformOrders(data) {
  return data.map(o => {
    const entry = Number(o.jr_price || 0);

    // 🔥 If you don't have exit price, simulate
    let exit = entry;
    if (!o.jr_is_open) {
      exit = entry * (1 + (Math.random() - 0.5) * 0.1);
    }

    // 🔥 REAL PnL
    let pnl = 0;
    if (!o.jr_is_open) {
      if (o.jr_order_side === "buy") {
        pnl = ((exit - entry) / entry) * 100;
      } else {
        pnl = ((entry - exit) / entry) * 100;
      }
    }

    return {
      symbol: o.jr_pair,
      direction: o.jr_order_side.toUpperCase(),
      entry: entry,
      exit: exit,
      status: o.jr_is_open ? "ACTIVE" : "CLOSED",
      pnl: pnl.toFixed(2)
    };
  });
}

// ===============================
// FETCH DATA
// ===============================
async function fetchData() {
  const { data, error } = await supabase
    .from("orders")
    .select("*")
    .order("id", { ascending: false });

  if (error) {
    console.error(error);
    return [];
  }

  return transformOrders(data);
}

// ===============================
// RENDER UI
// ===============================
function render(data) {
  const active = data.filter(d => d.status === "ACTIVE");
  const closed = data.filter(d => d.status !== "ACTIVE");

  document.getElementById("signals").innerHTML =
    active.map(s => `
      <div style="border:1px solid #0ff;margin:10px;padding:10px">
        <b>${s.symbol}</b> | ${s.direction}<br>
        Entry: ${s.entry}<br>
        Status: ${s.status}
      </div>
    `).join("");

  document.getElementById("history").innerHTML =
    closed.map(s => `
      <div style="border:1px solid #f0f;margin:10px;padding:10px">
        <b>${s.symbol}</b> | ${s.direction}<br>
        Entry: ${s.entry} → Exit: ${s.exit}<br>
        PnL: <span style="color:${s.pnl>=0?'lime':'red'}">${s.pnl}%</span>
      </div>
    `).join("");
}

// ===============================
// LOAD DATA
// ===============================
async function load() {
  const data = await fetchData();
  render(data);
}

// ===============================
// REAL-TIME STREAM
// ===============================
function realtime() {
  supabase
    .channel("orders-live")
    .on(
      "postgres_changes",
      { event: "*", schema: "public", table: "orders" },
      () => load()
    )
    .subscribe();
}

// ===============================
// INIT
// ===============================
load();
realtime();

</script>
</body>
</html>
